name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Configure Azure App Service environment variables
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          app-settings-json: |
            [
              { "name": "DATABASE_URL",  "value": "${{ secrets.DATABASE_URL }}",  "slotSetting": false },
              { "name": "DIRECT_URL",    "value": "${{ secrets.DIRECT_URL }}",    "slotSetting": false },
              { "name": "JWT_SECRET",    "value": "${{ secrets.JWT_SECRET }}",    "slotSetting": false },
              { "name": "CORS_ORIGIN",   "value": "${{ secrets.CORS_ORIGIN }}",   "slotSetting": false },
              { "name": "NODE_ENV",      "value": "production",                   "slotSetting": false }
            ]

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
